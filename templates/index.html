<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <p>Paste a long URL below to get a short link.</p>
        <!-- Form submits a POST request to the same page -->
        <form method="POST">
            <input type="text" name="original_url" placeholder="https://example.com/very/long/url" required>
            <button type="submit">Shorten</button>
        </form>
        <!-- Only show the result section when a short URL exists -->
        {% if short_url %}
        <div class="result">
            <p>Your shortened URL:</p>
            <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
        </div>
        {% endif %}
        <p><a href="/stats">View link stats</a></p>
    </div>
</body>
</html>
